<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Webcam Room System</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

.page{
    display:none;
}

.active{
    display:block;
}

button{
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#333;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#555;
}

input{
    padding:12px;
    width:260px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

video{
    width:95%;
    max-width:700px;
    margin-top:15px;
    border-radius:12px;
    border:2px solid #444;
    background:black;
}

.linkBox{
    margin-top:15px;
    padding:12px;
    background:#222;
    border-radius:10px;
    word-break:break-all;
}

</style>
</head>

<body>

<h1>Webcam Room System</h1>

<!-- HOME -->

<div id="home" class="page active">

    <button onclick="createRoom()">
        📱 Kamera Başlat
    </button>

    <button onclick="joinPage()">
        💻 Odaya Gir
    </button>

</div>

<!-- HOST -->

<div id="host" class="page">

    <h2>Telefon Yayını</h2>

    <div id="roomLink" class="linkBox"></div>

    <button onclick="copyLink()">
        Linki Kopyala
    </button>

    <br>

    <video
        id="localVideo"
        autoplay
        muted
        playsinline>
    </video>

</div>

<!-- JOIN -->

<div id="join" class="page">

    <h2>Bilgisayar İzleme</h2>

    <input
        id="roomInput"
        placeholder="Room ID">

    <button onclick="joinRoom()">
        Bağlan
    </button>

    <br>

    <video
        id="remoteVideo"
        autoplay
        playsinline>
    </video>

</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

// =====================================
// FIREBASE CONFIG
// =====================================

const firebaseConfig = {

    apiKey: "YOUR_KEY",

    authDomain:
    "YOUR_PROJECT.firebaseapp.com",

    databaseURL:
    "https://YOUR_PROJECT-default-rtdb.firebaseio.com",

    projectId:
    "YOUR_PROJECT"

};

// =====================================

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

// =====================================

let pc;
let localStream;
let roomId;

// =====================================
// STUN
// =====================================

const rtcConfig = {

    iceServers: [

        {
            urls:
            "stun:stun.l.google.com:19302"
        }

    ]
};

// =====================================
// PAGE SYSTEM
// =====================================

function showPage(id){

    document
    .querySelectorAll(".page")
    .forEach(page => {

        page.classList.remove("active");

    });

    document
    .getElementById(id)
    .classList.add("active");
}

// =====================================
// COPY LINK
// =====================================

function copyLink(){

    navigator.clipboard.writeText(

        document
        .getElementById("roomLink")
        .innerText

    );

    alert("Link kopyalandı");
}

// =====================================
// HOST
// =====================================

async function createRoom(){

    try{

        roomId = Math.random()
        .toString(36)
        .substring(2,8);

        showPage("host");

        const fullLink =

            location.origin +
            location.pathname +
            "?room=" +
            roomId;

        document
        .getElementById("roomLink")
        .innerText = fullLink;

        pc = new RTCPeerConnection(rtcConfig);

        localStream =

            await navigator
            .mediaDevices
            .getUserMedia({

                video:true,
                audio:false

            });

        document
        .getElementById("localVideo")
        .srcObject = localStream;

        localStream
        .getTracks()
        .forEach(track => {

            pc.addTrack(
                track,
                localStream
            );

        });

        const roomRef =

            db.ref(
                "rooms/" + roomId
            );

        // ICE

        pc.onicecandidate = e => {

            if(e.candidate) return;

            roomRef
            .child("offer")
            .set(

                JSON.stringify(
                    pc.localDescription
                )

            );
        };

        // OFFER

        const offer =

            await pc.createOffer();

        await pc.setLocalDescription(
            offer
        );

        // ANSWER WAIT

        roomRef.on(
            "value",
            async snap => {

                const data = snap.val();

                if(!data) return;

                if(

                    data.answer &&
                    !pc.currentRemoteDescription

                ){

                    await pc
                    .setRemoteDescription(

                        JSON.parse(
                            data.answer
                        )

                    );
                }
            }
        );

    }catch(err){

        alert(
            "Hata: " + err
        );
    }
}

// =====================================
// JOIN PAGE
// =====================================

function joinPage(){

    showPage("join");
}

// =====================================
// VIEWER
// =====================================

async function joinRoom(){

    try{

        roomId =

            document
            .getElementById("roomInput")
            .value
            .trim();

        if(!roomId){

            alert(
                "Room ID gir"
            );

            return;
        }

        const roomRef =

            db.ref(
                "rooms/" + roomId
            );

        pc = new RTCPeerConnection(
            rtcConfig
        );

        // STREAM

        pc.ontrack = e => {

            document
            .getElementById("remoteVideo")
            .srcObject =
            e.streams[0];
        };

        // ICE

        pc.onicecandidate = e => {

            if(e.candidate) return;

            roomRef
            .child("answer")
            .set(

                JSON.stringify(
                    pc.localDescription
                )

            );
        };

        // ROOM DATA

        const room =

            await roomRef.once(
                "value"
            );

        const data =
            room.val();

        if(!data){

            alert(
                "Oda bulunamadı"
            );

            return;
        }

        if(!data.offer){

            alert(
                "Offer bulunamadı"
            );

            return;
        }

        // OFFER

        await pc
        .setRemoteDescription(

            JSON.parse(
                data.offer
            )

        );

        // ANSWER

        const answer =

            await pc.createAnswer();

        await pc
        .setLocalDescription(
            answer
        );

    }catch(err){

        alert(
            "Hata: " + err
        );
    }
}

// =====================================
// AUTO JOIN
// =====================================

const params =

    new URLSearchParams(
        location.search
    );

const autoRoom =
    params.get("room");

if(autoRoom){

    showPage("join");

    document
    .getElementById("roomInput")
    .value = autoRoom;
}

</script>

</body>
</html>
