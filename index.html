<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebRTC Debug Room</title>
<style>
body { background:#111; color:white; text-align:center; font-family:Arial; }
video { width:280px; margin:10px; border:2px solid #444; border-radius:10px; }
textarea { width:90%; height:80px; margin:5px; }
button { padding:8px; margin:5px; }
</style>
</head>
<body>

<h2>WebRTC Manual Signaling (FIXED)</h2>

<video id="local" autoplay playsinline muted></video>
<video id="remote" autoplay playsinline></video>

<br>

<button onclick="startCam()">📷 Kamera</button>
<button onclick="createOffer()">🟢 Offer</button>
<button onclick="createAnswer()">🔵 Answer</button>

<br>

<textarea id="box"></textarea>

<script>
let pc;
let stream;

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function startPC(){
  pc = new RTCPeerConnection(config);

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = e => {
    document.getElementById("remote").srcObject = e.streams[0];
  };

  // 🔥 CRITICAL FIX: ICE candidate streaming
  pc.onicecandidate = (e)=>{
    if(e.candidate){
      const current = JSON.parse(localStorage.getItem("ice") || "[]");
      current.push(e.candidate);
      localStorage.setItem("ice", JSON.stringify(current));
    }
  };
}

async function startCam(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById("local").srcObject = stream;
}

async function createOffer(){
  startPC();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  document.getElementById("box").value = JSON.stringify(offer);
}

async function createAnswer(){
  const data = JSON.parse(document.getElementById("box").value);

  if(!pc) startPC();

  if(data.type === "offer"){
    await pc.setRemoteDescription(data);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    document.getElementById("box").value = JSON.stringify(answer);
  }

  else if(data.type === "answer"){
    await pc.setRemoteDescription(data);
  }
}
</script>

</body>
</html>
