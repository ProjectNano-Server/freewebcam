<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebSocket Webcam Chat</title>
<style>
body { background:#111; color:white; text-align:center; font-family:Arial; }
video { width:300px; margin:10px; border-radius:10px; border:2px solid #444; }
button { padding:10px; margin:5px; }
</style>
</head>
<body>

<h2>WebSocket Webcam Chat</h2>

<video id="local" autoplay playsinline muted></video>
<video id="remote" autoplay playsinline></video>

<br>

<button onclick="startCam()">📷 Kamera</button>
<button onclick="connect()">🔌 Bağlan</button>

<script>
let ws;
let pc;
let stream;

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function setupPC(){
  pc = new RTCPeerConnection(config);

  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.ontrack = (e) => {
    document.getElementById("remote").srcObject = e.streams[0];
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      ws.send(JSON.stringify({
        type: "ice",
        data: e.candidate
      }));
    }
  };
}

async function startCam(){
  stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById("local").srcObject = stream;
}

function connect(){
  ws = new WebSocket("ws://localhost:3000");

  ws.onopen = async () => {
    setupPC();

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    ws.send(JSON.stringify({
      type: "offer",
      data: offer
    }));
  };

  ws.onmessage = async (msg) => {
    const m = JSON.parse(msg.data);

    if (m.type === "offer") {
      if (!pc) setupPC();

      await pc.setRemoteDescription(m.data);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      ws.send(JSON.stringify({
        type: "answer",
        data: answer
      }));
    }

    if (m.type === "answer") {
      await pc.setRemoteDescription(m.data);
    }

    if (m.type === "ice") {
      try {
        await pc.addIceCandidate(m.data);
      } catch(e){}
    }
  };
}
</script>

</body>
</html>
