<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nano Auto WebRTC</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

#topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    background:#111;
    color:white;
    display:flex;
    align-items:center;
    gap:10px;
    padding:0 10px;
    z-index:10;
}

button{
    border:none;
    border-radius:10px;
    padding:10px 16px;
    background:#2d7cff;
    color:white;
    cursor:pointer;
}

input{
    border:none;
    border-radius:10px;
    padding:10px;
    width:140px;
}

video{
    width:100vw;
    height:100vh;
    object-fit:contain;
    background:black;
}

#status{
    color:#8f8;
}
</style>
</head>
<body>

<div id="topbar">

<input id="room" placeholder="oda kodu" value="nano37">

<button onclick="hostMode()">Yayıncı Modu</button>
<button onclick="viewerMode()">İzleyici Modu</button>
<button onclick="shareScreen()">Ekran Paylaş</button>

<div id="status">Hazır</div>

</div>

<video id="video" autoplay playsinline></video>

<script>

const video = document.getElementById("video");
const roomInput = document.getElementById("room");
</html>
