<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Webcam Room (Fixed)</title>
<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
video { width:300px; margin:10px; border:2px solid #444; border-radius:10px; }
textarea { width:90%; height:80px; margin:5px; }
button { padding:10px; margin:5px; }
</style>
</head>
<body>

<h2>Webcam Room System</h2>

<video id="localVideo" autoplay playsinline muted></video>
<video id="remoteVideo" autoplay playsinline></video>

<br>

<button onclick="startCamera()">📷 Kamerayı Başlat</button>
<button onclick="createOffer()">➕ Oda Aç (Host)</button>
<button onclick="setAnswer()">📥 Answer Yapıştır</button>

<br>

<textarea id="offerBox" placeholder="Offer / Answer buraya gelecek"></textarea>

<script>
let pc;
let localStream;

const config = {
  iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

async function startCamera(){
  localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
  document.getElementById("localVideo").srcObject = localStream;
}

function setupPC(){
  pc = new RTCPeerConnection(config);

  localStream.getTracks().forEach(track =>
    pc.addTrack(track, localStream)
  );

  pc.ontrack = (event)=>{
    document.getElementById("remoteVideo").srcObject = event.streams[0];
  };

  pc.onicecandidate = (e)=>{
    if(e.candidate) return;
    document.getElementById("offerBox").value =
      JSON.stringify(pc.localDescription);
  };
}

async function createOffer(){
  setupPC();

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
}

async function setAnswer(){
  const data = JSON.parse(document.getElementById("offerBox").value);

  if(!pc){
    setupPC();
  }

  if(data.type === "offer"){
    await pc.setRemoteDescription(data);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
  }
  else if(data.type === "answer"){
    await pc.setRemoteDescription(data);
  }
}
</script>

</body>
</html>
